name: Release binaries

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: build-${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x64
            os: ubuntu-latest
            bin: claw
            artifact_name: claw-linux-x64
          - name: macos-arm64
            os: macos-14
            bin: claw
            artifact_name: claw-macos-arm64
          - name: windows-x64
            os: windows-latest
            bin: claw.exe
            artifact_name: claw-windows-x64.exe
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust -> target

      - name: Build release binary
        run: cargo build --release -p rusty-claude-cli

      - name: Package artifact and checksum
        shell: bash
        run: |
          mkdir -p dist
          cp "target/release/${{ matrix.bin }}" "dist/${{ matrix.artifact_name }}"
          chmod +x "dist/${{ matrix.artifact_name }}"
          (cd dist && sha256sum "${{ matrix.artifact_name }}" > "${{ matrix.artifact_name }}.sha256")

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            rust/dist/${{ matrix.artifact_name }}
            rust/dist/${{ matrix.artifact_name }}.sha256

      - name: Upload release asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            rust/dist/${{ matrix.artifact_name }}
            rust/dist/${{ matrix.artifact_name }}.sha256
          fail_on_unmatched_files: true

  installer-windows:
    name: windows-installer
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust -> target

      - name: Build jclaw.exe
        working-directory: rust
        run: cargo build --release --bin jclaw

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Stage payload (jclaw.exe + tui source)
        shell: pwsh
        run: |
          $staging = "$env:RUNNER_TEMP\staging"
          New-Item -ItemType Directory -Force -Path $staging | Out-Null
          Copy-Item "rust\target\release\jclaw.exe" "$staging\jclaw.exe"
          # Copy the vendored TS source, excluding any local node_modules/.git.
          robocopy "tui" "$staging\tui" /E /XD node_modules .git /NFL /NDL /NJH /NJS /NP
          if ($LASTEXITCODE -ge 8) { throw "robocopy failed ($LASTEXITCODE)" }
          $global:LASTEXITCODE = 0
          "STAGING=$staging" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Bundle pinned bun.exe
        shell: pwsh
        run: |
          $url = "https://github.com/oven-sh/bun/releases/download/bun-v1.3.14/bun-windows-x64.zip"
          Invoke-WebRequest -Uri $url -OutFile "$env:RUNNER_TEMP\bun.zip"
          Expand-Archive -Path "$env:RUNNER_TEMP\bun.zip" -DestinationPath "$env:RUNNER_TEMP\bun" -Force
          Copy-Item "$env:RUNNER_TEMP\bun\bun-windows-x64\bun.exe" "$env:STAGING\bun.exe"

      - name: Install dependencies (full)
        shell: pwsh
        working-directory: ${{ env.STAGING }}\tui
        # Full install, not --production: opencode declares @opencode-ai/core
        # (a foundational runtime package imported at startup) as a
        # devDependency, so --production omits it and serve cannot boot. Ship
        # the same tree the dev machine runs.
        run: bun install

      - name: Verify staged tree boots (headless /agent probe)
        shell: pwsh
        run: |
          $bun = "$env:STAGING\bun.exe"
          $entry = "$env:STAGING\tui\packages\opencode\src\index.ts"
          $out = "$env:RUNNER_TEMP\serve-out.log"
          $err = "$env:RUNNER_TEMP\serve-err.log"
          # Capture the child's stdout/stderr so a boot failure shows the real
          # error (e.g. a missing module) instead of only a silent timeout.
          $proc = Start-Process -FilePath $bun `
            -ArgumentList @("run","--cwd","$env:STAGING\tui\packages\opencode",$entry,"serve","--port","14784","--print-logs") `
            -PassThru -WindowStyle Hidden -RedirectStandardOutput $out -RedirectStandardError $err
          try {
            $ok = $false
            foreach ($i in 1..30) {
              Start-Sleep -Seconds 2
              try {
                $resp = Invoke-WebRequest -Uri "http://127.0.0.1:14784/agent" -UseBasicParsing -TimeoutSec 3
                if ($resp.Content -match '"peak"' -and $resp.Content -match '"build"') { $ok = $true; break }
              } catch { }
            }
            if (-not $ok) {
              Write-Host "=== serve stdout ==="; if (Test-Path $out) { Get-Content $out -Tail 60 }
              Write-Host "=== serve stderr ==="; if (Test-Path $err) { Get-Content $err -Tail 60 }
              throw "staged tree failed to boot or /agent missing expected agents"
            }
            Write-Host "Staged tree booted; /agent lists peak + build."
          } finally {
            if (-not $proc.HasExited) { Stop-Process -Id $proc.Id -Force }
          }

      - name: Package portable zip
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          $zip = "dist\jclaw-windows-portable.zip"
          # bsdtar (built into windows-latest) is far faster than Inno's
          # per-file lzma on the ~100k-file node_modules tree. -a picks the zip
          # format from the extension. bun on Windows materializes real files
          # (copies/junctions), so the archive is self-contained: extract and
          # run jclaw.exe next to bun.exe + tui/ — locate_bun/locate_tui_dir
          # resolve both from the exe's own directory.
          tar -a -c -f $zip -C "$env:STAGING" .
          if ($LASTEXITCODE -ne 0) { throw "tar failed ($LASTEXITCODE)" }
          $hash = (Get-FileHash $zip -Algorithm SHA256).Hash.ToLower()
          "$hash  jclaw-windows-portable.zip" | Out-File -Encoding ascii "$zip.sha256"
          Write-Host ("Portable zip size: {0:N0} MB" -f ((Get-Item $zip).Length / 1MB))

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: jclaw-windows-portable
          path: |
            dist/jclaw-windows-portable.zip
            dist/jclaw-windows-portable.zip.sha256

      - name: Upload release asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          prerelease: true
          files: |
            dist/jclaw-windows-portable.zip
            dist/jclaw-windows-portable.zip.sha256
          fail_on_unmatched_files: true
          body: |
            ### jclaw Windows beta (portable)

            First Windows build. Download `jclaw-windows-portable.zip`, extract it anywhere, and run `jclaw.exe` (no install, no admin). Windows Terminal recommended over the legacy console.

            **Known beta limitations**
            - Unsigned — Windows SmartScreen may warn on first run ("More info" → "Run anyway").
            - The interactive TUI has passed a headless boot check in CI but has not been verified on a real Windows console.
