name: Release binaries

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: build-${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x64
            os: ubuntu-latest
            bin: claw
            artifact_name: claw-linux-x64
          - name: macos-arm64
            os: macos-14
            bin: claw
            artifact_name: claw-macos-arm64
          - name: windows-x64
            os: windows-latest
            bin: claw.exe
            artifact_name: claw-windows-x64.exe
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust -> target

      - name: Build release binary
        run: cargo build --release -p rusty-claude-cli

      - name: Package artifact and checksum
        shell: bash
        run: |
          mkdir -p dist
          cp "target/release/${{ matrix.bin }}" "dist/${{ matrix.artifact_name }}"
          chmod +x "dist/${{ matrix.artifact_name }}"
          # macOS has no sha256sum (it's shasum -a 256); fall back so the mac leg
          # doesn't die at packaging after a successful build.
          cd dist
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "${{ matrix.artifact_name }}" > "${{ matrix.artifact_name }}.sha256"
          else
            shasum -a 256 "${{ matrix.artifact_name }}" > "${{ matrix.artifact_name }}.sha256"
          fi

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            rust/dist/${{ matrix.artifact_name }}
            rust/dist/${{ matrix.artifact_name }}.sha256

      - name: Upload release asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            rust/dist/${{ matrix.artifact_name }}
            rust/dist/${{ matrix.artifact_name }}.sha256
          fail_on_unmatched_files: true

  installer-windows:
    name: windows-installer
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust -> target

      - name: Build jclaw.exe
        working-directory: rust
        run: cargo build --release --bin jclaw

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Stage payload (jclaw.exe + tui source)
        shell: pwsh
        run: |
          $staging = "$env:RUNNER_TEMP\staging"
          New-Item -ItemType Directory -Force -Path $staging | Out-Null
          Copy-Item "rust\target\release\jclaw.exe" "$staging\jclaw.exe"
          # Copy the vendored TS source, excluding any local node_modules/.git.
          robocopy "tui" "$staging\tui" /E /XD node_modules .git /NFL /NDL /NJH /NJS /NP
          if ($LASTEXITCODE -ge 8) { throw "robocopy failed ($LASTEXITCODE)" }
          $global:LASTEXITCODE = 0
          "STAGING=$staging" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Bundle pinned bun.exe
        shell: pwsh
        run: |
          $url = "https://github.com/oven-sh/bun/releases/download/bun-v1.3.14/bun-windows-x64.zip"
          Invoke-WebRequest -Uri $url -OutFile "$env:RUNNER_TEMP\bun.zip"
          Expand-Archive -Path "$env:RUNNER_TEMP\bun.zip" -DestinationPath "$env:RUNNER_TEMP\bun" -Force
          Copy-Item "$env:RUNNER_TEMP\bun\bun-windows-x64\bun.exe" "$env:STAGING\bun.exe"

      - name: Install dependencies (full)
        shell: pwsh
        working-directory: ${{ env.STAGING }}\tui
        # Full install, not --production: opencode declares @opencode-ai/core
        # (a foundational runtime package imported at startup) as a
        # devDependency, so --production omits it and serve cannot boot. Ship
        # the same tree the dev machine runs.
        #
        # --linker=hoisted: Bun's default "isolated" layout symlinks each
        # workspace package's node_modules/<pkg> back to a shared
        # node_modules/.bun/<pkg>@<hash> store. This CI runner has the
        # privilege to create those symlinks, but the Inno installer runs
        # PrivilegesRequired=lowest (no admin, no Developer Mode) on the end
        # user's machine, so tar.exe can't recreate them on extract —
        # @opentui/solid (and anything else hoisted into .bun) silently
        # disappears, breaking the bunfig preload. Hoisted linking installs
        # real files instead, so the extracted tree is self-contained.
        run: bun install --linker=hoisted

      - name: Archive payload (symlink-free)
        shell: pwsh
        run: |
          # One self-contained archive of the staged payload (jclaw.exe +
          # bun.exe + tui\ incl. node_modules). The installer ships this single
          # already-compressed file and extracts it at install time, so Inno
          # never per-file-compresses the ~100k-file node_modules tree (that
          # took 40+ min). bsdtar is built into windows-latest.
          #
          # -L dereferences symlinks into real files. Even with
          # --linker=hoisted, bun links *workspace* packages
          # (node_modules/@opencode-ai/core -> ..\..\packages\core etc.), and
          # the end user's unprivileged tar.exe cannot recreate links
          # (PrivilegesRequired=lowest, no admin/Developer Mode) — the target
          # dirs silently vanish and the app dies at import time
          # ("Cannot find module '@opencode-ai/core/...'"). The workspace
          # dependency graph is acyclic, so dereferencing terminates.
          $isrc = "$env:RUNNER_TEMP\isrc"
          New-Item -ItemType Directory -Force -Path $isrc | Out-Null
          tar -a -c -L -f "$isrc\payload.zip" -C "$env:STAGING" jclaw.exe bun.exe tui
          if ($LASTEXITCODE -ne 0) { throw "tar failed ($LASTEXITCODE)" }
          # Hard gate: any symlink entry in the archive would break the
          # unprivileged install, so fail the build rather than ship it.
          $links = @(tar -tvf "$isrc\payload.zip" | Select-String '^l')
          if ($links.Count -ne 0) {
            $links | Select-Object -First 20 | ForEach-Object { Write-Host $_ }
            throw "payload.zip contains $($links.Count) symlink entries; they cannot be extracted without admin rights"
          }
          Write-Host ("payload.zip: {0:N0} MB, 0 symlink entries" -f ((Get-Item "$isrc\payload.zip").Length / 1MB))
          "ISRC=$isrc" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Verify payload boots after extraction round-trip
        shell: pwsh
        run: |
          # Extract payload.zip the same way the installer does (System32
          # tar.exe) and boot-check the *extracted* tree, not the staged one —
          # this validates the exact artifact users receive, catching anything
          # lost in the archive round-trip (symlinks, long paths, ...).
          $rt = "$env:RUNNER_TEMP\roundtrip"
          New-Item -ItemType Directory -Force -Path $rt | Out-Null
          & "$env:SystemRoot\System32\tar.exe" -xf "$env:ISRC\payload.zip" -C $rt
          if ($LASTEXITCODE -ne 0) { throw "round-trip extraction failed ($LASTEXITCODE)" }
          $rp = @(Get-ChildItem $rt -Recurse -Force -Attributes ReparsePoint -ErrorAction SilentlyContinue)
          if ($rp.Count -ne 0) {
            $rp | Select-Object -First 20 | ForEach-Object { Write-Host $_.FullName }
            throw "extracted tree contains $($rp.Count) reparse points"
          }
          $bun = "$rt\bun.exe"
          $entry = "$rt\tui\packages\opencode\src\index.ts"
          $out = "$env:RUNNER_TEMP\serve-out.log"
          $err = "$env:RUNNER_TEMP\serve-err.log"
          # Capture the child's stdout/stderr so a boot failure shows the real
          # error (e.g. a missing module) instead of only a silent timeout.
          $proc = Start-Process -FilePath $bun `
            -ArgumentList @("run","--cwd","$rt\tui\packages\opencode",$entry,"serve","--port","14784","--print-logs") `
            -PassThru -WindowStyle Hidden -RedirectStandardOutput $out -RedirectStandardError $err
          try {
            $ok = $false
            foreach ($i in 1..30) {
              Start-Sleep -Seconds 2
              try {
                $resp = Invoke-WebRequest -Uri "http://127.0.0.1:14784/agent" -UseBasicParsing -TimeoutSec 3
                if ($resp.Content -match '"peak"' -and $resp.Content -match '"build"') { $ok = $true; break }
              } catch { }
            }
            if (-not $ok) {
              Write-Host "=== serve stdout ==="; if (Test-Path $out) { Get-Content $out -Tail 60 }
              Write-Host "=== serve stderr ==="; if (Test-Path $err) { Get-Content $err -Tail 60 }
              throw "round-tripped tree failed to boot or /agent missing expected agents"
            }
            Write-Host "Round-tripped tree booted; /agent lists peak + build."
          } finally {
            if (-not $proc.HasExited) { Stop-Process -Id $proc.Id -Force }
          }

      - name: Compile installer
        shell: pwsh
        run: |
          $isrc = $env:ISRC
          choco install innosetup --no-progress -y
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          $ver = if ($env:GITHUB_REF -like 'refs/tags/v*') { $env:GITHUB_REF -replace '^refs/tags/v','' } else { '0.0.0-dev' }
          & $iscc "/DStagingDir=$isrc" "/DAppVer=$ver" "installer\jclaw.iss"
          if ($LASTEXITCODE -ne 0) { throw "ISCC failed ($LASTEXITCODE)" }
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item "installer\Output\jclaw-setup.exe" "dist\jclaw-setup.exe"
          $hash = (Get-FileHash "dist\jclaw-setup.exe" -Algorithm SHA256).Hash.ToLower()
          "$hash  jclaw-setup.exe" | Out-File -Encoding ascii "dist\jclaw-setup.exe.sha256"
          Write-Host ("Installer size: {0:N0} MB" -f ((Get-Item "dist\jclaw-setup.exe").Length / 1MB))

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: jclaw-windows-installer
          path: |
            dist/jclaw-setup.exe
            dist/jclaw-setup.exe.sha256

      - name: Upload release asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: jclaw ${{ github.ref_name }}
          prerelease: true
          files: |
            dist/jclaw-setup.exe
            dist/jclaw-setup.exe.sha256
          fail_on_unmatched_files: true
          body: |
            ### jclaw ${{ github.ref_name }}

            Prebuilt binaries for Linux (x64), macOS (arm64), and Windows (x64), plus a one-click Windows installer.

            **Windows (one-click):** download `jclaw-setup.exe`, run it (per-user, no admin) — installs to `%LOCALAPPDATA%\Programs\jclaw`, adds a Start Menu shortcut, and puts `jclaw` on your PATH. Launch from the Start Menu or a new terminal.

            **Linux / macOS:** download `claw-linux-x64` / `claw-macos-arm64`, `chmod +x`, and run — same prerequisites as building from source (Bun + `bun install` in `tui/`).

            **Known beta limitations**
            - Windows installer is unsigned — SmartScreen may warn on first run ("More info" → "Run anyway").
