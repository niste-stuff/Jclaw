name: Rust CI

on:
  push:
    branches:
      - main
      - 'gaebal/**'
      - 'omx-issue-*'
    paths:
      - .github/workflows/rust-ci.yml
      - .github/FUNDING.yml
      - LICENSE
      - README.md
      - rust/**
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/rust-ci.yml
      - .github/FUNDING.yml
      - LICENSE
      - README.md
      - rust/**
  workflow_dispatch:

concurrency:
  group: rust-ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: rust

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: cargo fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust -> target
      - name: Check formatting
        run: cargo fmt --all --check

  test-workspace:
    name: cargo test --workspace
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust -> target
      - name: Run workspace tests
        run: cargo test --workspace

  clippy-workspace:
    name: cargo clippy --workspace
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust -> target
      - name: Run workspace clippy
        run: cargo clippy --workspace

  windows-smoke:
    name: windows PowerShell smoke
    runs-on: windows-latest
    defaults:
      run:
        working-directory: rust
        shell: pwsh
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust -> target
      - name: Build CLI for Windows smoke
        run: cargo build -p rusty-claude-cli
      - name: Smoke local commands without live credentials
        env:
          ANTHROPIC_API_KEY: ""
          ANTHROPIC_AUTH_TOKEN: ""
          OPENAI_API_KEY: ""
          XAI_API_KEY: ""
          DASHSCOPE_API_KEY: ""
        run: |
          $ErrorActionPreference = "Stop"
          $env:CLAW_CONFIG_HOME = Join-Path $env:RUNNER_TEMP "claw config home"
          New-Item -ItemType Directory -Force -Path $env:CLAW_CONFIG_HOME | Out-Null
          $workspace = Join-Path $env:RUNNER_TEMP "claw path smoke"
          New-Item -ItemType Directory -Force -Path $workspace | Out-Null
          $claw = Join-Path $env:GITHUB_WORKSPACE "rust\target\debug\claw.exe"
          Push-Location $workspace
          try {
            & $claw help
            & $claw status
            & $claw config env
            & $claw doctor
          } finally {
            Pop-Location
          }
